<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bloco Médico de Plantão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f5}
header{background:#1f2d3d;color:white;padding:16px;font-size:22px}
#tabs{display:flex;flex-wrap:wrap;background:#2c3e50}
.tab{padding:10px 16px;color:white;cursor:pointer}
.tab.active{background:#16a085}
.section{display:none;padding:20px}
.section.active{display:block}
textarea,input{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc}
textarea{height:150px}
button{margin-top:6px;margin-right:6px;padding:6px 10px;border:none;border-radius:6px;background:#16a085;color:white;cursor:pointer}
button:hover{background:#13856b}
.card{background:white;padding:12px;border-radius:6px;margin-top:10px;border:1px solid #ddd}
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
}
.modal{
background:white;
padding:20px;
border-radius:8px;
max-width:650px;
width:90%;
}
pre{white-space:pre-wrap;font-family:inherit}
</style>
</head>

<body>

<header>Bloco Médico de Plantão</header>

<div id="tabs">
<div class="tab active" onclick="openTab('anamnese',event)">Anamnese</div>
<div class="tab" onclick="openTab('hipotese',event)">Hipótese</div>
<div class="tab" onclick="openTab('exames',event)">Exames</div>
<div class="tab" onclick="openTab('prescricao',event)">Prescrição</div>
<div class="tab" onclick="openTab('conduta',event)">Conduta</div>
<div class="tab" onclick="openTab('protocolos',event)">Protocolos</div>
<div class="tab" onclick="openTab('pesquisa',event)">Pesquisa</div>
</div>

<div id="anamnese" class="section active">
<h3>Anamnese</h3>
<textarea></textarea>
</div>

<div id="hipotese" class="section">
<h3>Hipótese</h3>
<textarea></textarea>
</div>

<div id="exames" class="section">
<h3>Exames</h3>
<textarea></textarea>
</div>

<div id="prescricao" class="section">
<h3>Prescrição</h3>
<textarea></textarea>
</div>

<div id="conduta" class="section">
<h3>Conduta</h3>
<textarea></textarea>
</div>

<div id="protocolos" class="section">
<h3>Novo protocolo</h3>
<input id="nomeProtocolo" placeholder="Nome do protocolo">
<textarea id="textoProtocolo" placeholder="Texto do protocolo"></textarea>
<button onclick="salvarProtocolo()">Salvar protocolo</button>
</div>

<div id="pesquisa" class="section">
<h3>Pesquisar protocolo</h3>
<input id="campoPesquisa" placeholder="Pesquisar..." onkeyup="pesquisarTexto()">
<div id="resultadoPesquisa"></div>
</div>

<script>

const SUPABASE_URL = "https://dekksmllvgsxnumdiesz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRla2tzbWxsdmdzeG51bWRpZXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTY0MDQsImV4cCI6MjA4ODkzMjQwNH0.aWy4XXoJkpoi9eNCBlVJK3fqwsWDKABWcqeMbXN4tw0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let biblioteca = [];

function openTab(id,evt){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
evt.target.classList.add("active");
document.getElementById(id).classList.add("active");
}

async function salvarProtocolo(){

let nome=document.getElementById("nomeProtocolo").value.trim();
let texto=document.getElementById("textoProtocolo").value.trim();

if(!nome || !texto){
alert("Preencha nome e protocolo");
return;
}

const {error} = await client
.from("protocolos")
.insert([{nome:nome,texto:texto}]);

if(error){
alert("Erro ao salvar");
console.log(error);
return;
}

alert("Protocolo salvo");

document.getElementById("nomeProtocolo").value="";
document.getElementById("textoProtocolo").value="";

carregar();

}

async function carregar(){

const {data} = await client
.from("protocolos")
.select("*")
.order("id",{ascending:false});

biblioteca = data || [];

}

function pesquisarTexto(){

let termo=document.getElementById("campoPesquisa").value.toLowerCase();
let resultado=document.getElementById("resultadoPesquisa");

resultado.innerHTML="";

if(termo.length<2) return;

biblioteca.forEach((p,i)=>{

if(p.nome.toLowerCase().includes(termo) || p.texto.toLowerCase().includes(termo)){

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.nome}</b><br><br>
<button onclick="verProtocolo(${i})">Visualizar</button>
<button onclick="copiar(${i})">Copiar</button>
<button onclick="inserirConduta(${i})">Conduta</button>
<button onclick="inserirPrescricao(${i})">Prescrição</button>
<button onclick="excluirProtocolo(${i})">Excluir</button>
`;

resultado.appendChild(div);

}

});

}

function verProtocolo(i){

let p=biblioteca[i];

let overlay=document.createElement("div");
overlay.className="overlay";

overlay.innerHTML=`
<div class="modal">
<h3>${p.nome}</h3>
<pre>${p.texto}</pre>
<br>
<button onclick="copiar(${i})">Copiar</button>
<button onclick="document.body.removeChild(this.closest('.overlay'))">Fechar</button>
</div>
`;

document.body.appendChild(overlay);

}

function copiar(i){
navigator.clipboard.writeText(biblioteca[i].texto);
alert("Protocolo copiado");
}

function inserirConduta(i){
document.querySelector("#conduta textarea").value += "\n"+biblioteca[i].texto;
}

function inserirPrescricao(i){
document.querySelector("#prescricao textarea").value += "\n"+biblioteca[i].texto;
}

async function excluirProtocolo(i){

let confirmar = confirm("Deseja excluir este protocolo?");
if(!confirmar) return;

let id=biblioteca[i].id;

const {error}=await client
.from("protocolos")
.delete()
.eq("id",id);

if(error){
alert("Erro ao excluir");
console.log(error);
return;
}

alert("Protocolo excluído");

carregar();
document.getElementById("resultadoPesquisa").innerHTML="";

}

window.onload = carregar;

</script>

</body>
</html>
